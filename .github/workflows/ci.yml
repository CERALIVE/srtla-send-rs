name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Primary gate — runs on the PINNED nightly from rust-toolchain.toml. The
  # `toolchain` input is intentionally omitted so setup-rust-toolchain reads the
  # toolchain file (nightly-2026-06-12 + rustfmt/clippy/rust-src + the aarch64
  # target). Upstream floated `nightly`; the fork pins a date for a reproducible
  # device build, so CI must honour the pin. Keep every upstream step (fmt,
  # clippy -D warnings, check, the full test fan-out, and the cargo audit).
  test:
    name: Test (pinned nightly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check formatting
        run: cargo fmt --all -- --check

      # lib + bin only (NOT --all-targets): upstream test code carries pedantic
      # clippy debt; the gate matches upstream ci.yml exactly.
      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check compilation
        run: cargo check

      - name: Check compilation without test features
        run: cargo check --release

      # test-internals is the crate's ONLY feature, so --all-features ==
      # --features test-internals and runs the whole corpus (lib+bin+integration
      # +doctests, 348 tests). This single run is a strict superset of the four it
      # replaced (--lib 284, --lib+test-internals 296, +test-internals 348): the
      # cfg(not(feature="test-internals")) arms are visibility toggles, never gated
      # tests, so the feature drops nothing. No-feature shipping paths stay checked
      # by cargo check / check --release / clippy / build --release in this job.
      - name: Run all tests (--all-features = full corpus)
        run: cargo test --all-features --verbose

      - name: Install cargo-audit + cargo-deny (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run security audit
        run: cargo audit

      - name: Run supply-chain checks (advisories + sources)
        run: cargo deny check advisories sources

  # Dedicated BLOCKING loom model-check of the subscription manager. Gated
  # `#![cfg(loom)]`, so it is invisible to the `test` job above; it only compiles
  # and runs under `RUSTFLAGS="--cfg loom"`. Exhaustively explores the broadcast
  # vs subscribe/drop interleavings (no deadlock, no lost last frame, dead
  # subscriber pruned). A required gate: a regression here fails the PR.
  loom:
    name: Loom model (subscription manager)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run loom model test
        env:
          RUSTFLAGS: --cfg loom
        run: cargo test --features test-internals --test subscription_loom

  # Dedicated BLOCKING miri lane over the ONLY unsafe FFI in the tree: the
  # `recvmmsg` batch-receive path in src/connection/batch_recv.rs. miri vets the
  # PURE POINTER LOGIC — self-referential iovec/mmsghdr rebuild after a move
  # (init_rebuilds_self_pointers_after_move), the msg_len→MTU clamp
  # (iter_clamps_oversized_msg_len_to_mtu), and the sockaddr_storage→SocketAddr
  # cast + big-endian decode (sockaddr_storage_roundtrip). HARD LIMIT: miri
  # CANNOT execute the real recvmmsg syscall/FFI, so the live-syscall path is
  # NOT covered here — only the pointer logic around it. Each filter is its own
  # invocation (miri takes a single substring filter per run). --no-default-features
  # drops the mimalloc #[global_allocator] (C FFI miri cannot run); the system
  # allocator miri provides is used instead. --lib scopes to the unit-test binary
  # where all three pure tests live.
  miri:
    name: Miri (batch_recv pure pointer logic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install miri component
        run: rustup component add miri

      - name: Miri — self-pointer rebuild after move
        run: cargo miri test --lib --no-default-features --features test-internals init_rebuilds_self_pointers_after_move

      - name: Miri — oversized msg_len clamps to MTU
        run: cargo miri test --lib --no-default-features --features test-internals iter_clamps_oversized_msg_len_to_mtu

      - name: Miri — sockaddr_storage round-trip decode
        run: cargo miri test --lib --no-default-features --features test-internals sockaddr_storage_roundtrip

  # Cross-build both device-relevant targets and package the pipeline-compatible
  # .deb on every push/PR, so a packaging break (name, binary path, Conflicts,
  # filename glob) is caught before a tag is ever cut. The aarch64 leg is the
  # device target; the x86_64 leg is the dev/CI target. ci/build-deb.sh is the
  # single source of truth for the control metadata and runs the fetch-debs.sh
  # glob self-test.
  build-deb:
    name: Build .deb (${{ matrix.arch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            cross: true
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            cross: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Pinned nightly from rust-toolchain.toml + the extra build target. The
      # toolchain file already lists aarch64; `target` re-adds it harmlessly and
      # adds x86_64 for the amd64 leg.
      - name: Install Rust toolchain (from rust-toolchain.toml) + target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install aarch64 cross toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross binutils-aarch64-linux-gnu pkg-config

      - name: Build (${{ matrix.target }})
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Package .deb (asserts name, binary path, Conflicts, fetch glob)
        run: |
          ci/build-deb.sh "${{ matrix.arch }}" \
            "target/${{ matrix.target }}/release/srtla_send" dist

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: srtla-send-rs-${{ matrix.arch }}-deb
          path: dist/srtla-send-rs_*_${{ matrix.arch }}.deb
          if-no-files-found: error

  # Upstream cross-channel/cross-OS coverage — kept intact. rust-toolchain.toml
  # would otherwise force the pinned nightly onto these runners, so each job
  # invokes cargo with an explicit `+<channel>` (highest precedence, above the
  # toolchain file) to genuinely exercise stable/beta as upstream intended.
  test-stable:
    name: Test (Rust stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo +stable test --features test-internals

  test-beta:
    name: Test (Rust beta)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: beta

      - name: Run tests
        run: cargo +beta test

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo +stable test --features test-internals --verbose

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo +stable test --verbose
