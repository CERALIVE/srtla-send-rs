name: Publish @ceralive/srtla-send

# Publishes the pure-TS sender binding @ceralive/srtla-send to the PUBLIC npm
# registry via OIDC trusted publishing — no NPM_TOKEN. Two trigger shapes:
#   bindings-vYYYY.M.P        → stable release    → npm dist-tag `latest`
#   bindings-vYYYY.M.P-rc.N   → release candidate → npm dist-tag `next`
# Auth is the GitHub Actions OIDC identity (id-token: write) exchanged against
# the trusted publisher configured on the npm package; requires npm >= 11.5.1.
# A workflow_dispatch run performs a registry dry-run and cannot reach the OIDC job.
#
# VERSION SOURCE (decision): the binding versions on its OWN tag namespace,
# `bindings-vYYYY.M.P` (CalVer, matching @ceralive/cerastream), deliberately
# distinct from the Rust crate's `v*` release tags (release.yml). The binding is
# a thin registry-distributed helper over the binary, not the binary itself, so
# it ships on its own cadence. The published version is the committed
# `bindings/typescript/package.json` "version"; the tag does not mint it. The
# guard below refuses to publish unless the tag's version matches package.json
# exactly. To cut a binding release: bump package.json "version", commit, then
# `git tag bindings-vYYYY.M.P && git push origin bindings-vYYYY.M.P`.
#
# This workflow is intentionally separate from ci.yml / release.yml (Rust .deb)
# and shares no triggers with them — `v*` tags drive the .deb release untouched,
# `bindings-v*` tags drive this one.
on:
  push:
    tags:
      - "bindings-v*"
  workflow_dispatch:

permissions:
  contents: read

# Never cancel a publish mid-run — a half-published npm release is unrecoverable.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release-ref:
    name: Verify binding release provenance
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify tag, package version, and checked-out commit
        run: bash ci/verify-bindings-release-ref.sh

  test-bindings:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm
          cache-dependency-path: bindings/typescript/pnpm-lock.yaml

      - name: Install pinned trusted-publishing npm
        run: npm install -g npm@11.18.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build dist
        run: pnpm build

      - name: Tarball guard — only compiled dist/ ships
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          FILES="$(node -e 'const j=require("/tmp/pack.json"); for (const f of j[0].files) console.log(f.path)')"
          echo "$FILES"
          if echo "$FILES" | grep -E '\.ts$' | grep -vE '\.d\.ts$'; then
            echo "::error::tarball contains TypeScript source — only compiled dist/ may ship"
            exit 1
          fi

      - name: Upload validated binding build
        uses: actions/upload-artifact@v7
        with:
          name: srtla-send-binding-dist-${{ github.sha }}
          path: bindings/typescript/dist
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [verify-release-ref, test-bindings]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: srtla-send-binding-dist-${{ github.sha }}
          path: bindings/typescript/dist

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install pinned trusted-publishing npm
        run: npm install -g npm@11.18.0

      - name: Select npm dist-tag
        id: tag
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if echo "$PKG" | grep -q -- '-rc'; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm via OIDC trusted publishing
        env:
          NPM_CONFIG_PROVENANCE: ${{ !github.event.repository.private }}
        run: npm publish --access public --tag "${{ steps.tag.outputs.dist_tag }}"

  dry-run:
    name: Validate npm package without publishing
    needs: test-bindings
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: srtla-send-binding-dist-${{ github.sha }}
          path: bindings/typescript/dist

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install pinned npm
        run: npm install -g npm@11.18.0

      - name: Validate package tarball
        run: npm publish --access public --dry-run
