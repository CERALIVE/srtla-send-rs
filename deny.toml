# Cargo-deny configuration for srtla-send-rs
# Enforces supply-chain security: advisories and source integrity.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
yanked = "deny"

# RUSTSEC-2026-0097 is resolved: runtime rand 0.10.2 and proptest's dev-only
# rand 0.9.4 are both on patched lines (>= 0.10.1 and >= 0.9.3 respectively).

[sources]
# Enforce crate source integrity.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
